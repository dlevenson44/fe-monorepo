name: Auto Approve Repo Owner's PR

on: pull_request

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
    if: github.actor == 'dlevenson44'
    steps:
      - uses: hmarr/auto-approve-action@v3
        with:
          review-message: "Auto approved Repo Owner's PR"
          github-token: ${{ secrets.ACTIONS_TOKEN }}

